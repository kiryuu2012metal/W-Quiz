let currentQuestions = [], wrongIds = [], answered = [], score = 0;

function init(questions, wrongOnly = false) {
  currentQuestions = questions; wrongIds = [];
  answered = new Array(questions.length).fill(false); score = 0;
  document.getElementById('wrongBanner').className = wrongOnly ? 'wrong-only-banner show' : 'wrong-only-banner';
  document.getElementById('resultPanel').className = 'result-panel';
  renderAll(); updateProgress();
}

function renderAll() {
  document.getElementById('quizArea').innerHTML = currentQuestions.map((q, i) => renderCard(q, i)).join('');
}

function renderCard(q, i) {
  const optsHtml = q.opts.map((o, oi) =>
    '<button class="opt-btn" id="opt_'+i+'_'+oi+'" onclick="choose('+i+','+oi+')">' + String.fromCharCode(9312+oi) + ' ' + o + '</button>'
  ).join('');
  const kwHtml = q.keywords.map(k => '<span class="keyword-chip">'+k+'</span>').join('');
  return '<div class="quiz-card" id="card_'+i+'"><span class="q-num">Q'+(i+1)+'</span><p class="q-text">'+q.q+'</p><div class="options">'+optsHtml+'</div><div class="explanation" id="exp_'+i+'"><p>'+q.exp+'</p><div style="margin-top:0.5rem;">'+kwHtml+'</div></div></div>';
}

function choose(qIdx, optIdx) {
  if (answered[qIdx]) return;
  answered[qIdx] = true;
  const q = currentQuestions[qIdx];
  const isCorrect = optIdx === q.ans;
  if (isCorrect) score++; else wrongIds.push(qIdx);
  for (let i = 0; i < q.opts.length; i++) {
    const btn = document.getElementById('opt_'+qIdx+'_'+i);
    btn.disabled = true;
    if (i === q.ans) btn.classList.add(isCorrect && i === optIdx ? 'correct' : 'reveal');
    if (!isCorrect && i === optIdx) btn.classList.add('wrong');
  }
  document.getElementById('exp_'+qIdx).classList.add('show');
  updateProgress();
  if (answered.every(Boolean)) setTimeout(showResult, 600);
}

function updateProgress() {
  const done = answered.filter(Boolean).length, total = currentQuestions.length;
  document.getElementById('pbar').style.width = (done/total*100)+'%';
  document.getElementById('plabel').textContent = done + ' / ' + total + ' 완료';
}

function showResult() {
  const total = currentQuestions.length, pct = Math.round(score/total*100);
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreDenom').textContent = '/ ' + total;
  const titles = ['다시 도전해 보세요','기초를 다져봅시다','조금 더 공부가 필요해요','잘 이해하고 있어요','거의 완벽해요','만점! 완벽합니다'];
  const msgs = ['모범답안의 키워드를 다시 정리해 보세요.','필수 키워드 표를 먼저 암기해 보세요.','틀린 문제의 해설을 꼼꼼히 읽어보세요.','오답 문제를 한 번 더 풀어보면 완성됩니다.','핵심 키워드를 시험장에서도 떠올릴 수 있을 거예요.','이 주제는 완벽하게 정복했습니다!'];
  const idx = Math.min(Math.floor(pct/20), 5);
  document.getElementById('resultTitle').textContent = titles[idx];
  document.getElementById('resultMsg').textContent = msgs[idx];
  document.getElementById('resultPanel').className = 'result-panel show';
  document.getElementById('resultPanel').scrollIntoView({behavior:'smooth'});
}

function retryWrong() {
  if (wrongIds.length === 0) { alert('모든 문제를 맞혔습니다!'); return; }
  init(wrongIds.map(i => currentQuestions[i]), true);
  window.scrollTo({top:0,behavior:'smooth'});
}

function restartAll() {
  init(ALL_QUESTIONS, false);
  window.scrollTo({top:0,behavior:'smooth'});
}

init(ALL_QUESTIONS);
</script>
