<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로마 공화정 → 원수정 퀴즈 20문항</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0d0d14;
    --card:       #14141f;
    --card2:      #1a1a2a;
    --border:     #2e2e4a;
    --gold:       #c9922a;
    --gold-l:     #e8b84b;
    --gold-d:     #8a6018;
    --crimson:    #9b1c1c;
    --ivory:      #f0e6cc;
    --ivory-d:    #c8b88a;
    --muted:      #6b6b8a;
    --correct:    #1a6b3c;
    --correct-l:  #22c55e;
    --wrong:      #8b1a1a;
    --wrong-l:    #ef4444;
    --shadow:     rgba(0,0,0,.5);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 100% 60% at 50% 0%, #1a1028 0%, transparent 65%),
      repeating-linear-gradient(60deg, rgba(201,146,42,.03) 0, rgba(201,146,42,.03) 1px, transparent 1px, transparent 18px),
      repeating-linear-gradient(-60deg, rgba(201,146,42,.03) 0, rgba(201,146,42,.03) 1px, transparent 1px, transparent 18px);
    min-height: 100vh;
    font-family: 'Noto Serif KR', serif;
    color: var(--ivory);
    padding-bottom: 60px;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 48px 20px 36px;
    position: relative;
  }
  .hero::after {
    content: '';
    display: block;
    width: 160px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 24px auto 0;
  }
  .hero-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 5px;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .hero h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(18px, 4vw, 26px);
    font-weight: 700;
    color: var(--ivory);
    line-height: 1.4;
    letter-spacing: 1px;
  }
  .hero h1 span { color: var(--gold-l); }
  .hero-sub {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0;
    max-width: 640px;
    margin: 0 auto 24px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    padding: 10px 20px;
    background: transparent;
    border: none; border-bottom: 2px solid transparent;
    color: var(--muted);
    font-size: 13px; font-weight: 600;
    font-family: 'Noto Serif KR', serif;
    cursor: pointer;
    margin-bottom: -1px;
    transition: color .2s, border-color .2s;
  }
  .tab-btn.active { color: var(--gold-l); border-bottom-color: var(--gold); }

  /* ── CONTAINER ── */
  .container { max-width: 640px; margin: 0 auto; padding: 0 20px; }

  /* ── PROGRESS ── */
  .meta-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .q-counter { font-size: 12px; color: var(--muted); letter-spacing: 1px; }
  .score-badge {
    background: var(--card2); border: 1px solid var(--border);
    color: var(--gold-l); font-size: 12px; font-weight: 700;
    padding: 3px 12px; border-radius: 999px;
  }
  .progress-bg {
    height: 4px; background: var(--card2); border-radius: 2px;
    margin-bottom: 20px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-d), var(--gold-l));
    border-radius: 2px;
    transition: width .4s ease;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 20px 20px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .q-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold-d), var(--gold), var(--gold-d));
  }
  .cat-tag {
    display: inline-block;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px;
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 14px;
    background: rgba(201,146,42,.15);
    color: var(--gold-l);
    border: 1px solid rgba(201,146,42,.3);
  }
  .question {
    font-size: 16px; font-weight: 700;
    line-height: 1.75;
    color: var(--ivory);
    margin-bottom: 20px;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 9px; }
  .option {
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    display: flex; align-items: flex-start; gap: 12px;
    transition: border-color .2s, background .2s, transform .15s;
    text-align: left;
  }
  .option:hover:not(:disabled) {
    border-color: var(--gold-d);
    background: rgba(201,146,42,.07);
    transform: translateX(3px);
  }
  .option:disabled { cursor: default; }
  .opt-num {
    flex-shrink: 0;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--border);
    color: var(--muted);
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, color .2s;
  }
  .opt-text {
    font-size: 14px; color: var(--ivory-d); line-height: 1.6; flex: 1;
  }
  /* States */
  .option.selected  { border-color: var(--gold); background: rgba(201,146,42,.12); }
  .option.selected .opt-num { background: var(--gold); color: #0d0d14; }
  .option.correct   { border-color: var(--correct-l); background: rgba(34,197,94,.1); }
  .option.correct .opt-num { background: var(--correct-l); color: #0d0d14; }
  .option.wrong     { border-color: var(--wrong-l); background: rgba(239,68,68,.08); }
  .option.wrong .opt-num { background: var(--wrong-l); color: #fff; }

  /* ── EXPLAIN BOX ── */
  .explain-wrap { margin-top: 14px; }
  .explain-box {
    margin-top: 10px;
    background: rgba(201,146,42,.07);
    border: 1px solid rgba(201,146,42,.2);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px; line-height: 1.75;
    color: var(--ivory-d);
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* ── CONFIRM BTN ── */
  .btn-confirm {
    width: 100%;
    background: linear-gradient(135deg, var(--gold-d), var(--gold));
    border: none; border-radius: 10px;
    color: #0d0d14; font-size: 14px; font-weight: 800;
    font-family: inherit;
    padding: 13px;
    cursor: pointer;
    letter-spacing: 1px;
    margin-top: 4px;
    transition: opacity .2s, transform .1s;
  }
  .btn-confirm:hover { opacity: .9; transform: translateY(-1px); }
  .btn-confirm:disabled { opacity: .35; cursor: default; transform: none; }

  /* ── NAV ── */
  .nav-row {
    display: flex; justify-content: space-between; gap: 10px;
    margin-top: 12px;
  }
  .btn-nav {
    flex: 1;
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--ivory-d); font-size: 13px; font-weight: 600;
    font-family: inherit;
    padding: 10px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .btn-nav:hover { border-color: var(--gold-d); background: rgba(201,146,42,.07); }
  .btn-nav:disabled { opacity: .3; cursor: default; }

  /* ── RESULT ── */
  .result-view { display: none; }
  .result-view.open { display: block; }
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 24px;
    text-align: center;
    position: relative; overflow: hidden;
    margin-bottom: 16px;
  }
  .result-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--gold-d), var(--gold-l), var(--gold-d));
  }
  .result-icon { font-size: 48px; margin-bottom: 12px; }
  .result-grade {
    font-family: 'Cinzel', serif;
    font-size: 22px; font-weight: 700;
    color: var(--gold-l);
    margin-bottom: 6px;
  }
  .result-score {
    font-size: 40px; font-weight: 900;
    color: var(--ivory);
    margin-bottom: 4px;
  }
  .result-score span { font-size: 18px; color: var(--muted); }
  .result-pct { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

  .result-list { text-align: left; margin-bottom: 20px; }
  .result-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .result-row:last-child { border-bottom: none; }
  .r-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--card2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: var(--muted);
    flex-shrink: 0;
  }
  .r-snippet { flex: 1; color: var(--ivory-d); }
  .r-ok { font-size: 16px; }

  .btn-restart {
    width: 100%;
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--ivory-d);
    font-size: 13px; font-weight: 700;
    font-family: inherit; padding: 12px;
    cursor: pointer; margin-bottom: 10px;
    transition: border-color .2s;
  }
  .btn-restart:hover { border-color: var(--gold-d); }
  .btn-kw {
    width: 100%;
    background: linear-gradient(135deg, var(--gold-d), var(--gold));
    border: none; border-radius: 10px;
    color: #0d0d14; font-size: 13px; font-weight: 800;
    font-family: inherit; padding: 12px;
    cursor: pointer;
  }

  /* ── KEYWORDS TAB ── */
  .kw-tab { display: none; }
  .kw-tab.open { display: block; }
  .kw-section { margin-bottom: 18px; }
  .kw-section-title {
    font-family: 'Cinzel', serif;
    font-size: 11px; letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .kw-item {
    display: flex; gap: 12px; align-items: flex-start;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    margin-bottom: 8px;
  }
  .kw-num {
    flex-shrink: 0;
    width: 24px; height: 24px; border-radius: 50%;
    background: rgba(201,146,42,.15); border: 1px solid rgba(201,146,42,.3);
    color: var(--gold-l); font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .kw-term { font-size: 14px; font-weight: 700; color: var(--ivory); margin-bottom: 3px; }
  .kw-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .trap-box {
    background: rgba(155,28,28,.12);
    border: 1px solid rgba(155,28,28,.3);
    border-radius: 10px; padding: 14px;
    margin-bottom: 8px;
  }
  .trap-q { font-size: 13px; color: var(--wrong-l); font-weight: 700; margin-bottom: 4px; }
  .trap-a { font-size: 12px; color: var(--ivory-d); line-height: 1.6; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-eyebrow">SPQR · HISTORIA</div>
  <h1>로마 공화정 → <span>원수정 전환</span></h1>
  <div class="hero-sub">4지선다 퀴즈 20문항 · 세계문화사 수험</div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="0">📝 퀴즈</button>
  <button class="tab-btn" data-tab="1">🔑 핵심키워드</button>
</div>

<div class="container">

  <!-- ── QUIZ TAB ── -->
  <div id="quiz-tab">
    <div id="quiz-view">
      <div class="meta-row">
        <span class="q-counter" id="q-counter">1 / 20</span>
        <span class="score-badge">점수 <span id="score-num">0</span> / 20</span>
      </div>
      <div class="progress-bg"><div class="progress-fill" id="progress" style="width:5%"></div></div>

      <div class="q-card">
        <div class="cat-tag" id="cat-tag"></div>
        <div class="question" id="question-text"></div>
        <div class="options" id="options"></div>
        <div class="explain-wrap hidden" id="explain-wrap">
          <div class="explain-box" id="explain-box"></div>
        </div>
      </div>

      <button class="btn-confirm" id="btn-confirm" disabled>정답 확인</button>
      <div class="nav-row">
        <button class="btn-nav" id="btn-prev" disabled>← 이전</button>
        <button class="btn-nav" id="btn-next" disabled>다음 →</button>
      </div>
    </div>

    <div class="result-view" id="result-view">
      <div class="result-card">
        <div class="result-icon" id="result-icon"></div>
        <div class="result-grade" id="result-grade"></div>
        <div class="result-score"><span id="final-score">0</span> <span>/ 20</span></div>
        <div class="result-pct" id="result-pct"></div>
        <div class="result-list" id="result-list"></div>
        <button class="btn-restart" id="btn-restart">↺ 다시 풀기</button>
        <button class="btn-kw" id="btn-goto-kw">🔑 핵심키워드 정리 보기</button>
      </div>
    </div>
  </div>

  <!-- ── KEYWORDS TAB ── -->
  <div id="kw-tab" class="kw-tab">
    <div class="kw-section">
      <div class="kw-section-title">SECTION 1 — 사회경제적 균열</div>
      <div id="kw-list-1"></div>
    </div>
    <div class="kw-section">
      <div class="kw-section-title">SECTION 2 — 군대 사병화</div>
      <div id="kw-list-2"></div>
    </div>
    <div class="kw-section">
      <div class="kw-section-title">SECTION 3 — 내전과 원수정 수립</div>
      <div id="kw-list-3"></div>
    </div>
    <div class="kw-section">
      <div class="kw-section-title">⚠️ 자주 나오는 함정</div>
      <div id="trap-list"></div>
    </div>
  </div>

</div>

<script>
const questions = [
  {
    cat: "사회경제적 배경",
    q: "포에니 전쟁(BC 264~146) 이후 로마 농촌에서 발생한 가장 핵심적인 사회경제적 변화는?",
    opts: ["소농 자영농의 증가와 중산층 확대","노예 노동 기반의 라티푼디움 팽창으로 자영농 몰락","도시 상공업 발달로 무역 흑자 증가","원로원 세력의 경제적 약화"],
    ans: 1,
    exp: "정복지 확대로 노예 노동을 활용한 대농장(라티푼디움)이 팽창하면서 소규모 자영농이 몰락하고 도시 빈민층이 급증하였습니다. 이것이 공화정 위기의 사회경제적 출발점입니다."
  },
  {
    cat: "사회경제적 배경",
    q: "티베리우스 그라쿠스(BC 133)와 가이우스 그라쿠스(BC 121)가 각각 추진한 개혁 내용으로 옳은 것은?",
    opts: ["티베리우스 — 곡물법, 가이우스 — 공유지 재분배","티베리우스 — 공유지 재분배, 가이우스 — 곡물법","둘 다 군제 개혁에 집중","둘 다 원로원 해산을 시도"],
    ans: 1,
    exp: "티베리우스 그라쿠스(BC 133)는 공유지 재분배를 추진했고, 가이우스 그라쿠스(BC 121)는 곡물법을 추진했습니다. 두 형제 모두 원로원 귀족 세력에 의해 살해되었습니다."
  },
  {
    cat: "사회경제적 배경",
    q: "귀족파(옵티마테스)와 민중파(포풀라레스)의 대립이 단순한 정치 경쟁에서 폭력적 갈등으로 변질된 직접적 계기는?",
    opts: ["마리우스의 군제 개혁","그라쿠스 형제의 살해","포에니 전쟁 종결","술라의 로마 진군"],
    ans: 1,
    exp: "그라쿠스 형제가 개혁을 추진하다 원로원 세력에 의해 살해됨으로써, 정치 갈등이 제도적 협상이 아닌 폭력으로 해결되는 선례가 확립되었습니다."
  },
  {
    cat: "군대 사병화",
    q: "마리우스가 BC 107년에 단행한 군제 개혁의 핵심 내용은?",
    opts: ["원로원 귀족에게 군 지휘권 독점 부여","무산 시민의 입대 허용","기병 중심 전술로의 전환","외국 용병 대규모 채용"],
    ans: 1,
    exp: "마리우스는 재산이 없는 무산 시민(프롤레타리우스)의 입대를 허용했습니다. 이로써 국가가 아닌 장군이 퇴역 후 토지를 약속하게 되어, 병사의 충성 대상이 국가에서 장군 개인으로 이동하였습니다."
  },
  {
    cat: "군대 사병화",
    q: "마리우스 군제 개혁 이후 '군대 사병화'가 발생한 구조적 이유로 가장 적절한 것은?",
    opts: ["원로원이 병사 급여를 삭감하여 불만이 쌓였기 때문","국가 대신 장군이 퇴역 후 토지를 보장하면서 충성 대상이 이동했기 때문","외국 전쟁이 줄어들어 병사들이 할 일이 없었기 때문","귀족파와 민중파가 각각 별도의 군대를 창설했기 때문"],
    ans: 1,
    exp: "토지를 약속하는 주체가 '국가'가 아닌 '장군 개인'이 되면서, 병사들은 로마 공화국이 아닌 자신에게 토지를 약속한 특정 장군에게 충성하게 되었습니다. 이것이 사병화의 핵심 메커니즘입니다."
  },
  {
    cat: "군대 사병화",
    q: "술라(Sulla)가 BC 88년에 취한 행동과 그 역사적 의미로 가장 적절한 것은?",

  { q: "❌ 술라를 단순 '선례'로만 서술?", a: "✅ 술라의 선례가 카이사르의 루비콘을 구조적으로 가능하게 했음을 명시해야 분석 서술이 됨." },
];

// ── STATE ──
let current = 0, score = 0;
let results = Array(questions.length).fill(null);
let userAnswers = Array(questions.length).fill(null);
let confirmedQ = Array(questions.length).fill(false);

// ── UTILS ──
const $ = id => document.getElementById(id);

function renderQ() {
  const q = questions[current];
  $('q-counter').textContent = `${current + 1} / ${questions.length}`;
  $('progress').style.width = `${((current + 1) / questions.length) * 100}%`;
  $('cat-tag').textContent = q.cat;
  $('question-text').textContent = q.q;

  const optEl = $('options');
  optEl.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="opt-num">${['①','②','③','④'][i]}</span><span class="opt-text">${opt}</span>`;
    btn.disabled = confirmedQ[current];

    if (confirmedQ[current]) {
      if (i === q.ans) btn.classList.add('correct');
      else if (userAnswers[current] === i) btn.classList.add('wrong');
    } else if (userAnswers[current] === i) {
      btn.classList.add('selected');
    }

    if (!confirmedQ[current]) {
      btn.addEventListener('click', () => selectOpt(i));
    }
    optEl.appendChild(btn);
  });

  // explain — 정답 확인 즉시 자동 표시
  const expWrap = $('explain-wrap');
  if (confirmedQ[current]) {
    expWrap.classList.remove('hidden');
    $('explain-box').textContent = q.exp;
    $('explain-box').classList.add('open');
  } else {
    expWrap.classList.add('hidden');
    $('explain-box').classList.remove('open');
  }

  // confirm btn
  const confirmBtn = $('btn-confirm');
  if (confirmedQ[current]) {
    confirmBtn.textContent = current === questions.length - 1 ? '🏁 결과 보기' : '다음 문제 →';
    confirmBtn.disabled = false;
  } else {
    confirmBtn.textContent = '정답 확인';
    confirmBtn.disabled = userAnswers[current] === null;
  }

  // nav
  $('btn-prev').disabled = current === 0;
  $('btn-next').disabled = !confirmedQ[current] || current === questions.length - 1;

  $('score-num').textContent = score;
}

function selectOpt(i) {
  if (confirmedQ[current]) return;
  userAnswers[current] = i;
  renderQ();
}

$('btn-confirm').addEventListener('click', () => {
  if (confirmedQ[current]) {
    if (current === questions.length - 1) { showResult(); return; }
    current++; renderQ(); return;
  }
  confirmedQ[current] = true;
  const correct = userAnswers[current] === questions[current].ans;
  results[current] = correct;
  if (correct) score++;
  renderQ();
});

$('btn-prev').addEventListener('click', () => { if (current > 0) { current--; renderQ(); } });
$('btn-next').addEventListener('click', () => { if (current < questions.length - 1) { current++; renderQ(); } });

function showResult() {
  $('quiz-view').classList.add('hidden');
  const rv = $('result-view');
  rv.classList.add('open');

  const pct = Math.round(score / questions.length * 100);
  const [icon, grade] =
    pct >= 90 ? ['🏆', '최우수'] :
    pct >= 75 ? ['👏', '우수'] :
    pct >= 60 ? ['👍', '양호'] : ['📖', '복습 필요'];

  $('result-icon').textContent = icon;
  $('result-grade').textContent = grade;
  $('final-score').textContent = score;
  $('result-pct').textContent = `정답률 ${pct}%`;

  $('result-list').innerHTML = results.map((ok, i) => `
    <div class="result-row">
      <div class="r-num">${i + 1}</div>
      <div class="r-snippet">${questions[i].q.slice(0, 26)}…</div>
      <div class="r-ok">${ok ? '✅' : '❌'}</div>
    </div>`).join('');
}

$('btn-restart').addEventListener('click', () => {
  current = 0; score = 0;
  results = Array(questions.length).fill(null);
  userAnswers = Array(questions.length).fill(null);
  confirmedQ = Array(questions.length).fill(false);
  $('result-view').classList.remove('open');
  $('quiz-view').classList.remove('hidden');
  renderQ();
});

$('btn-goto-kw').addEventListener('click', () => switchTab(1));

// ── TABS ──
function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  $('quiz-tab').classList.toggle('hidden', idx !== 0);
  $('kw-tab').classList.toggle('open', idx === 1);
}
document.querySelectorAll('.tab-btn').forEach((b, i) => b.addEventListener('click', () => switchTab(i)));

// ── BUILD KEYWORDS ──
function buildKW(containerId, arr) {
  $(containerId).innerHTML = arr.map((k, i) => `
    <div class="kw-item">
      <div class="kw-num">${i + 1}</div>
      <div><div class="kw-term">${k.term}</div><div class="kw-desc">${k.desc}</div></div>
    </div>`).join('');
}
buildKW('kw-list-1', keywords.s1);
buildKW('kw-list-2', keywords.s2);
buildKW('kw-list-3', keywords.s3);

$('trap-list').innerHTML = traps.map(t => `
  <div class="trap-box">
    <div class="trap-q">${t.q}</div>
    <div class="trap-a">${t.a}</div>
  </div>`).join('');

// ── INIT ──
renderQ();
</script>
</body>
</html>
