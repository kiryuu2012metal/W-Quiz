<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영국 명예혁명 — 확인 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1814;
    --card: #211f1a;
    --border: #2e2b24;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,168,76,0.15);
    --red: #c0392b;
    --red-dim: rgba(192,57,43,0.15);
    --green: #27ae60;
    --green-dim: rgba(39,174,96,0.15);
    --text: #e8e2d4;
    --text-dim: #8a8070;
    --text-mid: #b8b0a0;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* HEADER */
  .header {
    background: linear-gradient(160deg, #1e1b14 0%, #0f0e0c 60%);
    border-bottom: 1px solid var(--border);
    padding: 36px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 80% at 50% -20%, rgba(201,168,76,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.3);
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 14px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(20px, 5vw, 28px);
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .header p {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.03em;
  }

  /* SCORE BAR */
  .score-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 680px;
    margin: 20px auto 0;
    padding: 14px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    gap: 12px;
  }
  .score-item { text-align: center; }
  .score-item .val {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
  }
  .score-item .lbl {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }
  .score-divider { width: 1px; height: 36px; background: var(--border); }

  /* MAIN */
  .main { max-width: 680px; margin: 0 auto; padding: 28px 16px 0; }

  /* MODE TABS */
  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .mode-tab {
    flex: 1;
    padding: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .mode-tab.active {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold-light);
    font-weight: 500;
  }
  .mode-tab:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* PROGRESS */
  .progress-wrap {
    margin-bottom: 20px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 22px;
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .q-num {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .q-category {
    font-size: 11px;
    color: var(--text-dim);
    background: rgba(255,255,255,0.04);
    padding: 3px 8px;
    border-radius: 3px;
  }
  .q-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 20px;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    width: 100%;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .option:hover:not(:disabled) {
    background: rgba(201,168,76,0.06);
    border-color: rgba(201,168,76,0.25);
  }
  .option .badge {
    flex-shrink: 0;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    transition: all 0.18s;
    margin-top: 1px;
  }
  .option .opt-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-mid);
  }
  .option:disabled { cursor: default; }

  /* States */
  .option.correct {
    background: var(--green-dim);
    border-color: var(--green);
  }
  .option.correct .badge {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }
  .option.correct .opt-text { color: #7eeaa4; }

  .option.wrong {
    background: var(--red-dim);
    border-color: var(--red);
  }
  .option.wrong .badge {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .option.wrong .opt-text { color: #e07070; }

  .option.reveal {
    background: rgba(201,168,76,0.06);
    border-color: rgba(201,168,76,0.3);
  }
  .option.reveal .badge {
    background: var(--gold);
    border-color: var(--gold);
    color: #111;
  }
  .option.reveal .opt-text { color: var(--gold-light); }

  /* EXPLANATION */
  .explanation {
    margin-top: 14px;
    padding: 16px 18px;
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 8px;
    display: none;
    animation: fadeUp 0.25s ease;
  }
  .explanation.show { display: block; }
  .explanation .ex-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .explanation p {
    font-size: 13.5px;
    line-height: 1.75;
    color: var(--text-mid);
  }
  .explanation strong { color: var(--gold-light); font-weight: 500; }

  /* NEXT BUTTON */
  .btn-next {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    background: var(--gold);
    border: none;
    border-radius: var(--radius);
    color: #111;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    display: none;
  }
  .btn-next.show { display: block; }
  .btn-next:hover { background: var(--gold-light); transform: translateY(-1px); }

  /* RESULT PANEL */
  .result-panel {
    display: none;
    text-align: center;
    padding: 40px 20px;
    animation: fadeUp 0.4s ease;
  }
  .result-panel.show { display: block; }
  .result-icon {
    font-size: 52px;
    margin-bottom: 16px;
  }
  .result-score {
    font-family: 'Noto Serif KR', serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 6px;
  }
  .result-sub {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 28px;
  }
  .result-breakdown {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 32px;
  }
  .rb-item { text-align: center; }
  .rb-val { font-size: 24px; font-weight: 700; font-family: 'Noto Serif KR', serif; }
  .rb-val.ok { color: var(--green); }
  .rb-val.no { color: var(--red); }
  .rb-lbl { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
  .result-btns { display: flex; flex-direction: column; gap: 10px; }
  .btn-retry, .btn-retry-wrong {
    padding: 13px 20px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
    border: none;
  }
  .btn-retry {
    background: var(--gold-dim);
    border: 1px solid var(--gold);
    color: var(--gold-light);
  }
  .btn-retry:hover { background: rgba(201,168,76,0.25); }
  .btn-retry-wrong {
    background: var(--red-dim);
    border: 1px solid var(--red);
    color: #e07070;
  }
  .btn-retry-wrong:hover { background: rgba(192,57,43,0.25); }
  .btn-retry-wrong:disabled { opacity: 0.3; cursor: not-allowed; }

  /* WRONG MODE BANNER */
  .wrong-banner {
    display: none;
    background: var(--red-dim);
    border: 1px solid rgba(192,57,43,0.4);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #e07070;
    text-align: center;
  }
  .wrong-banner.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-tag">세계문화사 확인 퀴즈</div>
  <h1>영국 명예혁명 (1688)</h1>
  <p>배경 · 권리장전 · 의회민주주의 · 대서양 혁명의 연쇄</p>
  <div class="score-bar">
    <div class="score-item">
      <div class="val" id="s-total">12</div>
      <div class="lbl">전체 문항</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <div class="val" id="s-correct" style="color:var(--green)">0</div>
      <div class="lbl">정답</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <div class="val" id="s-wrong" style="color:var(--red)">0</div>
      <div class="lbl">오답</div>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <div class="val" id="s-remain">12</div>
      <div class="lbl">남은 문항</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-all" onclick="switchMode('all')">전체 풀기</button>
    <button class="mode-tab" id="tab-wrong" onclick="switchMode('wrong')" disabled>오답만 풀기</button>
  </div>

  <div class="wrong-banner" id="wrong-banner">⚠️ 오답 재풀기 모드 — 틀린 문항만 다시 풀어봅니다</div>

  <div class="progress-wrap">
    <div class="progress-info">
      <span id="prog-label">1 / 12</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="quiz-area"></div>
  <div class="result-panel" id="result-panel"></div>
</div>

<script>
const ALL_QUESTIONS = [
  {
    id: 1,
    category: '배경',
    text: '청교도 혁명(1642~49)의 직접적 원인으로 가장 적절한 것은?',
    options: [
      '크롬웰이 의회를 해산하고 호국경에 취임하였다.',
      '찰스 1세가 의회 동의 없이 과세하고 청교도를 박해하였다.',
      '제임스 2세의 아들 출생으로 가톨릭 왕조의 존속이 확실시되었다.',
      '하노버 왕조가 수립되어 내각책임제가 실시되었다.'
    ],
    answer: 1,
    explanation: '<strong>찰스 1세</strong>는 의회 동의 없이 과세하고 청교도를 박해하였다. 의회가 권리청원(1628)을 제출하자 일시 승인 후 의회를 해산하고 전제 통치를 계속하였다. 이에 내전이 발생하여 청교도 혁명으로 이어졌다. ①은 혁명 이후 크롬웰 시기의 일이며, ③은 명예혁명의 직접 원인, ④는 명예혁명 이후의 결과이다.'
  },
  {
    id: 2,
    category: '배경',
    text: '명예혁명(1688) 직전, 의회가 윌리엄 3세를 초청한 결정적 계기는?',
    options: [
      '찰스 2세가 가톨릭교도를 우대하며 심사법을 무력화하였다.',
      '크롬웰 사후 왕정이 복고되어 스튜어트 왕조가 재건되었다.',
      '제임스 2세에게 아들이 태어나 가톨릭 왕조의 존속이 확실시되었다.',
      '의회 내 토리당이 단독으로 국왕 폐위를 의결하였다.'
    ],
    answer: 2,
    explanation: '<strong>제임스 2세의 아들 출생</strong>으로 가톨릭 왕조가 계속될 것이 확실해지자, 의회 내 토리·휘그 양당이 연합하여 네덜란드의 윌리엄 3세를 초청하였다. ①은 찰스 2세 시기의 사건, ②는 1660년 왕정복고, ④는 양당 연합이었으며 단독 의결이 아니다.'
  },
  {
    id: 3,
    category: '전개',
    text: '1688년 명예혁명의 전개 과정으로 옳은 것은?',
    options: [
      '윌리엄 3세가 상륙 후 장기간의 내전 끝에 제임스 2세를 추방하였다.',
      '제임스 2세가 저항 없이 프랑스로 망명하여 무혈로 마무리되었다.',
      '의회가 찰스 2세를 처형하고 공화정을 선포하였다.',
      '윌리엄 3세가 단독 국왕으로 추대되어 즉위하였다.'
    ],
    answer: 1,
    explanation: '1688년 11월 윌리엄 3세가 군대를 이끌고 상륙하자 <strong>제임스 2세는 저항 없이 프랑스로 망명</strong>하였다. 단 한 방울의 피도 흘리지 않아 "명예혁명(Glorious Revolution)"으로 불린다. 이후 의회는 윌리엄 3세와 메리 2세를 <strong>공동 국왕</strong>으로 추대하였다.'
  },
  {
    id: 4,
    category: '권리장전',
    text: '1689년 권리장전(Bill of Rights)의 내용으로 옳지 않은 것은?',
    options: [
      '의회 동의 없는 법률 정지를 금지하였다.',
      '의회 동의 없는 과세를 금지하였다.',
      '의회 동의 없는 상비군 유지를 금지하였다.',
      '국왕에게 의회 해산권을 명문으로 보장하였다.'
    ],
    answer: 3,
    explanation: '권리장전의 핵심 내용은 ①법률정지 금지, ②과세 금지, ③상비군 유지 금지, ④의회 내 언론 자유, ⑤자유 선거 보장이다. <strong>국왕의 의회 해산권을 보장하는 조항은 없다.</strong> 오히려 권리장전은 왕권을 제한하고 의회의 권한을 강화하는 방향으로 제정되었다.'
  },
  {
    id: 5,
    category: '권리장전',
    text: '권리장전의 다음 조항들 중 서로 성격이 다른 하나는?',
    options: [
      '의회 동의 없는 과세 금지',
      '의회 동의 없는 법률 정지 금지',
      '의회 내 언론 자유 보장',
      '국왕의 천부적 신성을 법률로 확인'
    ],
    answer: 3,
    explanation: '①②③은 모두 실제 권리장전에 포함된 조항이다. <strong>"국왕의 천부적 신성 확인"</strong>은 권리장전의 내용이 아니다. 권리장전은 왕권신수설을 부정하고 왕권을 법률로 제한하는 입헌주의를 확립하였다. 나머지 두 항목인 상비군 유지 금지와 자유 선거 보장도 권리장전에 포함된다.'
  },
  {
    id: 6,
    category: '의의',
    text: '명예혁명이 의회민주주의 발전에 기여한 의의로 가장 적절한 것은?',
    options: [
      '보통선거권을 최초로 모든 성인 남녀에게 부여하였다.',
      '의회주권(Parliamentary Sovereignty) 원칙을 처음으로 법제화하였다.',
      '군주제를 완전히 폐지하고 공화정을 영구히 확립하였다.',
      '국민 전체의 직접 민주주의를 헌법에 명시하였다.'
    ],
    answer: 1,
    explanation: '명예혁명은 <strong>의회주권 원칙을 처음으로 법제화</strong>하였다. 의회가 왕권을 법적으로 제한하고 과세·입법 등 핵심 국정을 통제하게 되었다. 다만 ①보통선거권은 19세기 선거법 개혁에서 점진적으로 확대되었으며, ③군주제는 유지되어 입헌군주제가 확립되었고, ④직접 민주주의가 아니라 의회 중심의 간접 민주주의이다.'
  },
  {

// STATE
let mode = 'all';
let currentQuestions = [];
let currentIdx = 0;
let correctIds = new Set();
let wrongIds = new Set();
let answered = false;
let sessionCorrect = 0;
let sessionWrong = 0;

function init(qs) {
  currentQuestions = qs;
  currentIdx = 0;
  sessionCorrect = 0;
  sessionWrong = 0;
  answered = false;
  document.getElementById('result-panel').classList.remove('show');
  document.getElementById('result-panel').style.display = '';
  updateScoreBar();
  renderQuestion();
}

function switchMode(m) {
  if (m === 'wrong' && wrongIds.size === 0) return;
  mode = m;
  document.getElementById('tab-all').classList.toggle('active', m === 'all');
  document.getElementById('tab-wrong').classList.toggle('active', m === 'wrong');
  document.getElementById('wrong-banner').classList.toggle('show', m === 'wrong');
  if (m === 'all') {
    correctIds.clear(); wrongIds.clear();
    document.getElementById('tab-wrong').disabled = true;
    init(ALL_QUESTIONS);
  } else {
    const wrongQs = ALL_QUESTIONS.filter(q => wrongIds.has(q.id));
    wrongIds.clear();
    init(wrongQs);
  }
}

function updateScoreBar() {
  document.getElementById('s-total').textContent = ALL_QUESTIONS.length;
  document.getElementById('s-correct').textContent = correctIds.size;
  document.getElementById('s-wrong').textContent = wrongIds.size;
  document.getElementById('s-remain').textContent = Math.max(0, currentQuestions.length - currentIdx);
}

function updateProgress() {
  const done = currentIdx;
  const total = currentQuestions.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('prog-label').textContent = `${Math.min(done + 1, total)} / ${total}`;
  document.getElementById('prog-pct').textContent = `${pct}%`;
  document.getElementById('prog-fill').style.width = pct + '%';
}

function renderQuestion() {
  const area = document.getElementById('quiz-area');
  if (currentIdx >= currentQuestions.length) {
    area.innerHTML = '';
    showResult();
    return;
  }
  updateProgress();
  const q = currentQuestions[currentIdx];
  const labels = ['①', '②', '③', '④'];
  area.innerHTML = `
    <div class="question-card" id="qcard">
      <div class="q-meta">
        <span class="q-num">Q${currentIdx + 1}</span>
        <span class="q-category">${q.category}</span>
      </div>
      <p class="q-text">${q.text}</p>
      <div class="options" id="opts">
        ${q.options.map((o, i) => `
          <button class="option" id="opt${i}" onclick="selectAnswer(${i})">
            <span class="badge">${labels[i]}</span>
            <span class="opt-text">${o}</span>
          </button>
        `).join('')}
      </div>
      <div class="explanation" id="explanation">
        <div class="ex-label">📖 해설</div>
        <p>${q.explanation}</p>
      </div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">
        ${currentIdx + 1 < currentQuestions.length ? '다음 문제 →' : '결과 보기'}
      </button>
    </div>`;
  answered = false;
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = currentQuestions[currentIdx];
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.disabled = true);

  if (idx === q.answer) {
    opts[idx].classList.add('correct');
    correctIds.add(q.id);
    wrongIds.delete(q.id);
    sessionCorrect++;
  } else {
    opts[idx].classList.add('wrong');
    opts[q.answer].classList.add('reveal');
    wrongIds.add(q.id);
    correctIds.delete(q.id);
    sessionWrong++;
  }
  document.getElementById('explanation').classList.add('show');
  document.getElementById('btn-next').classList.add('show');
  updateScoreBar();
  if (wrongIds.size > 0) document.getElementById('tab-wrong').disabled = false;
}

function nextQuestion() {
  currentIdx++;
  renderQuestion();
  updateProgress();
}

function showResult() {
  const panel = document.getElementById('result-panel');
  const total = currentQuestions.length;
  const pct = Math.round((sessionCorrect / total) * 100);
  let icon = pct >= 90 ? '🏆' : pct >= 70 ? '👍' : '📚';
  let msg = pct >= 90 ? '완벽합니다! 시험 준비 완료!' : pct >= 70 ? '잘 하셨습니다. 오답을 다시 확인해 보세요.' : '핵심 개념을 다시 복습하고 오답 재풀기를 해 보세요.';

  panel.innerHTML = `
    <div class="result-icon">${icon}</div>
    <div class="result-score">${pct}점</div>
    <div class="result-sub">${msg}</div>
    <div class="result-breakdown">
      <div class="rb-item"><div class="rb-val ok">${sessionCorrect}</div><div class="rb-lbl">정답</div></div>
      <div class="rb-item"><div class="rb-val no">${sessionWrong}</div><div class="rb-lbl">오답</div></div>
      <div class="rb-item"><div class="rb-val">${total}</div><div class="rb-lbl">전체</div></div>
    </div>
    <div class="result-btns">
      <button class="btn-retry" onclick="switchMode('all')">🔄 전체 다시 풀기</button>
      <button class="btn-retry-wrong" onclick="switchMode('wrong')" ${wrongIds.size === 0 ? 'disabled' : ''}>
        ❌ 오답만 다시 풀기 ${wrongIds.size > 0 ? '(' + wrongIds.size + '문항)' : '(오답 없음)'}
      </button>
    </div>`;

  panel.classList.add('show');
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-pct').textContent = '100%';
  document.getElementById('prog-label').textContent = `${total} / ${total}`;
}

// START
init(ALL_QUESTIONS);
</script>
