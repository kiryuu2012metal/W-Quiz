<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; background: #f5f4f0; color: #2c2c2a; line-height: 1.7; }
  .container { max-width: 760px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  .progress-wrap { background: #e0ded6; border-radius: 99px; height: 6px; margin-bottom: 2rem; }
  .progress-bar { background: #534AB7; height: 6px; border-radius: 99px; transition: width 0.4s; }
  .question-card { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
  .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .q-num { font-size: 12px; color: #888780; }
  .q-tag { font-size: 11px; background: #EEEDFE; color: #3C3489; padding: 2px 8px; border-radius: 6px; }
  .q-text { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; line-height: 1.6; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option-btn { text-align: left; padding: 10px 14px; border: 0.5px solid #d3d1c7; border-radius: 8px; background: #fff; font-size: 14px; cursor: pointer; transition: background 0.15s, border-color 0.15s; color: #2c2c2a; line-height: 1.5; }
  .option-btn:hover:not(:disabled) { background: #f1efe8; border-color: #b4b2a9; }
  .option-btn.correct { background: #EAF3DE; border-color: #639922; color: #27500A; font-weight: 500; }
  .option-btn.wrong { background: #FCEBEB; border-color: #E24B4A; color: #501313; }
  .option-btn.reveal { background: #EAF3DE; border-color: #639922; color: #27500A; }
  .option-btn:disabled { cursor: default; }
  .explanation { margin-top: 12px; padding: 12px 14px; background: #f5f4f0; border-radius: 8px; font-size: 13px; color: #5F5E5A; line-height: 1.7; display: none; }
  .explanation.show { display: block; }
  .explanation strong { color: #3C3489; }
  .result-icon { font-size: 18px; margin-right: 6px; }

  .nav-row { display: flex; gap: 10px; margin-top: 1.5rem; flex-wrap: wrap; }
  .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: 0.5px solid #b4b2a9; background: #fff; color: #2c2c2a; transition: background 0.15s; }
  .btn:hover { background: #f1efe8; }
  .btn-primary { background: #534AB7; color: #fff; border-color: #534AB7; }
  .btn-primary:hover { background: #3C3489; }
  .btn-danger { background: #E24B4A; color: #fff; border-color: #E24B4A; }
  .btn-danger:hover { background: #A32D2D; }

  .summary-card { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 12px; padding: 2rem; text-align: center; }
  .summary-score { font-size: 48px; font-weight: 500; color: #534AB7; }
  .summary-label { font-size: 14px; color: #888780; margin-bottom: 1.5rem; }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .summary-item { background: #f5f4f0; border-radius: 8px; padding: 1rem; }
  .summary-item-num { font-size: 22px; font-weight: 500; }
  .summary-item-label { font-size: 12px; color: #888780; }
  .wrong-list { text-align: left; margin-top: 1rem; }
  .wrong-item { padding: 8px 0; border-bottom: 0.5px solid #e0ded6; font-size: 13px; color: #5F5E5A; }
  .wrong-item:last-child { border-bottom: none; }

  .hidden { display: none; }
  .section-title { font-size: 14px; font-weight: 500; color: #888780; margin: 1.5rem 0 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
</style>

let currentQuestions = [];
let currentIdx = 0;
let answered = [];
let wrongIndices = [];
let isRetryMode = false;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function startQuiz(questions, retryMode = false) {
  currentQuestions = questions;
  currentIdx = 0;
  answered = new Array(questions.length).fill(null);
  wrongIndices = [];
  isRetryMode = retryMode;
  document.getElementById('summaryArea').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const q = currentQuestions[currentIdx];
  const total = currentQuestions.length;
  const pct = (currentIdx / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';

  const isAnswered = answered[currentIdx] !== null;
  const selected = answered[currentIdx];

  let optionsHtml = q.options.map((opt, i) => {
    let cls = 'option-btn';
    if (isAnswered) {
      if (i === q.answer) cls += ' correct';
      else if (i === selected && selected !== q.answer) cls += ' wrong';
    }
    return `<button class="${cls}" ${isAnswered ? 'disabled' : ''} onclick="selectAnswer(${i})">${['①','②','③','④'][i]} ${opt}</button>`;
  }).join('');

  let expHtml = '';
  if (isAnswered) {
    const icon = selected === q.answer ? '✅' : '❌';
    expHtml = `<div class="explanation show"><span class="result-icon">${icon}</span><strong>${selected === q.answer ? '정답입니다!' : '오답입니다.'}</strong><br><br>${q.exp}</div>`;
  }

  let navHtml = '';
  if (isAnswered) {
    if (currentIdx < total - 1) {
      navHtml = `<button class="btn btn-primary" onclick="nextQ()">다음 문제 →</button>`;
    } else {
      navHtml = `<button class="btn btn-primary" onclick="showSummary()">결과 보기 →</button>`;
    }
  }

  document.getElementById('quizArea').innerHTML = `
    <div class="question-card">
      <div class="q-header">
        <span class="q-num">문제 ${currentIdx + 1} / ${total}</span>
        <span class="q-tag">${q.tag}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optionsHtml}</div>
      ${expHtml}
    </div>`;
  document.getElementById('navRow').innerHTML = navHtml;
}

function selectAnswer(i) {
  if (answered[currentIdx] !== null) return;
  answered[currentIdx] = i;
  const q = currentQuestions[currentIdx];
  if (i !== q.answer) wrongIndices.push(currentIdx);
  renderQuestion();
}

function nextQ() {
  currentIdx++;
  renderQuestion();
}

function showSummary() {
  document.getElementById('quizArea').innerHTML = '';
  document.getElementById('navRow').innerHTML = '';
  document.getElementById('progressBar').style.width = '100%';

  const total = currentQuestions.length;
  const correct = answered.filter((a, i) => a === currentQuestions[i].answer).length;
  const wrong = total - correct;

  const wrongListHtml = wrongIndices.length > 0
    ? wrongIndices.map(wi => `<div class="wrong-item">Q${wi+1}. ${currentQuestions[wi].q}</div>`).join('')
    : '<div class="wrong-item" style="color:#639922;">오답이 없습니다! 완벽합니다 🎉</div>';

  const retryBtn = wrongIndices.length > 0
    ? `<button class="btn btn-danger" style="width:100%;margin-bottom:8px" onclick="retryWrong()">오답만 다시 풀기 (${wrongIndices.length}문제)</button>`
    : '';

  document.getElementById('summaryArea').classList.remove('hidden');
  document.getElementById('summaryArea').innerHTML = `
    <div class="summary-card">
      <div class="summary-score">${correct} / ${total}</div>
      <div class="summary-label">정답 수 (${Math.round(correct/total*100)}%)</div>
      <div class="summary-grid">
        <div class="summary-item"><div class="summary-item-num" style="color:#639922">${correct}</div><div class="summary-item-label">정답</div></div>
        <div class="summary-item"><div class="summary-item-num" style="color:#E24B4A">${wrong}</div><div class="summary-item-label">오답</div></div>
      </div>
      <p class="section-title">오답 목록</p>
      <div class="wrong-list">${wrongListHtml}</div>
    </div>
    <div class="nav-row" style="margin-top:1rem;flex-direction:column">
      ${retryBtn}
      <button class="btn btn-primary" style="width:100%" onclick="startQuiz(ALL_QUESTIONS)">처음부터 다시 풀기</button>
    </div>`;
}

function retryWrong() {
  const wrongQs = wrongIndices.map(i => currentQuestions[i]);
  document.getElementById('summaryArea').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  startQuiz(wrongQs, true);
}

startQuiz(ALL_QUESTIONS);
</script>
</body>
</html>
